  <div class="container mt-5">
    <h2 class="text-center">Help center ; report the problem here</h2>

    <div class="row">
        <div class="col mb-3 mt-3">
            <label for="account">Enter Account</label>
            <input type="text" id="account" class="form-control" placeholder="Your account name">
        </div>
        <div class="col mb-3 mt-3">
            <label for="password">Enter Password</label>
            <input type="password" id="password" class="form-control" placeholder="Your password">
    </div>
  </div>

  <div class="mb-3">
    <label for="urgency">Is the problem urgent?</label>
    <select id="urgency" class="form-select">
         <option value="no">Not Urgent</option>
          <option value="yes">Urgent</option>
    </select>
  </div>

  <div class="mb-3">
    <label for="problem">Describe the Problem</label>
    <textarea id="problem" class="form-control" rows="6" placeholder="Enter details here..."></textarea>
  </div>

  <button type="button" class="btn btn-primary" onclick="submitProblem()">Submit Problem</button>
  </div>

  <script>
    function submitProblem() {
        alert("Problem submitted successfully!");
    }
  </script>
