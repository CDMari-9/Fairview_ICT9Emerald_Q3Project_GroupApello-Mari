  <div class="container mt-5">
    <h2 class="text-center">Fare Matrix</h2>
    <div class="mb-3">
      <label for="pickup" class="form-label">Pickup Station</label>
      <select class="form-select" id="pickup">
        <option value="0">North Avenue</option>
        <option value="1.3">Quezon Avenue</option>
        <option value="2.6">Kamuning</option>
        <option value="4.0">Cubao</option>
        <option value="5.3">Santolan-Annapolis</option>
        <option value="6.7">Ortigas</option>
        <option value="8.0">Shaw Boulevard</option>
        <option value="9.3">Boni</option>
        <option value="10.7">Guadalupe</option>
        <option value="12.0">Buendia</option>
        <option value="13.3">Ayala</option>
        <option value="14.7">Magallanes</option>
        <option value="16.9">Taft Avenue</option>
      </select>
    </div>
  </div>
  
  <div class="container mt-5">
  <div class="mb-3">
      <label for="droppoff" class="form-label">Drop off Station</label>
      <select class="form-select" id="dropoff">
        <option value="0">North Avenue</option>
        <option value="1.3">Quezon Avenue</option>
        <option value="2.6">Kamuning</option>
        <option value="4.0">Cubao</option>
        <option value="5.3">Santolan-Annapolis</option>
        <option value="6.7">Ortigas</option>
        <option value="8.0">Shaw Boulevard</option>
        <option value="9.3">Boni</option>
        <option value="10.7">Guadalupe</option>
        <option value="12.0">Buendia</option>
        <option value="13.3">Ayala</option>
        <option value="14.7">Magallanes</option>
        <option value="16.9">Taft Avenue</option>
      </select>
    </div>

    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="disc">
      <label class="form-check-label" for="disc">Apply 20% Discount</label>
      </div>
      <button type="button" class="btn btn-primary" onclick="calculateFare()">Compute Fare</button>

      <div class="mt-5">
    <h4>Total Fare:</h4>
    <p id="DisplayAns" class="fs-4 fw-bold text-success">₱ 0.00</p>

    <button type="button" class="btn btn-primary" onclick="bookaride()">Book a Ride</button>
  </div>
  </div>

 


  <script>
    function bookaride() {
        alert("Ride successfully book!");
    }
  

    
    function calculateFare() {
      let pickup = parseFloat(document.getElementById("pickup").value);
      let dropoff = parseFloat(document.getElementById("dropoff").value);
      let baseFare = 50; 
      let perKMRate = 15; 
      let baseKM = 2; 
      let discount = document.getElementById("disc").checked;

      let distance = Math.abs(dropoff - pickup);

      let extraKM = Math.max(distance - baseKM, 0);

      let fare = baseFare + (extraKM * perKMRate);

      if (discount) {
        fare = fare * 0.8;
      }
       document.getElementById("DisplayAns").innerHTML = "₱ " + fare.toFixed(2);
    }

  </script>
